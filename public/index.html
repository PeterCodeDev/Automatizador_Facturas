<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatizador de Facturas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }

        .upload-zone.dragover {
            background: #e0e4ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #555;
            font-size: 1rem;
        }

        .upload-text span {
            color: #667eea;
            font-weight: bold;
            text-decoration: underline;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            display: none;
            margin-bottom: 20px;
        }

        .preview-container.active {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.active {
            display: block;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #856404;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-details {
            margin-top: 15px;
            text-align: left;
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 8px;
        }

        .result-details p {
            margin: 5px 0;
            font-size: 0.9rem;
        }

        .result-details strong {
            color: #333;
        }

        /* Nuevos estilos para la tabla de historial y soporte PDF */
        .history-container {
            margin-top: 30px;
            text-align: left;
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .history-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .history-table th, .history-table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .history-table th {
            color: #667eea;
            font-weight: bold;
        }

        .history-table tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-badge.no {
            background: #ffe3e3;
            color: #c92a2a;
        }

        .status-badge.si {
            background: #d3f9d8;
            color: #2b8a3e;
        }

        .pdf-icon {
            font-size: 4rem;
            color: #e53e3e;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 650px;">
        <h1>Automatizador de Facturas PRO</h1>
        <p class="subtitle">Sube una foto o PDF de tu factura y la IA extraerá los datos hacia Google Sheets</p>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📄</div>
            <p class="upload-text">Arrastra una imagen/PDF aquí o <span>haz clic para seleccionar</span></p>
        </div>

        <input type="file" id="fileInput" accept="image/*,application/pdf">

        <div class="preview-container" id="previewContainer">
            <img class="preview-image" id="previewImage" alt="Vista previa" style="display: none;">
            <div id="pdfPreview" style="display: none;">
                <div class="pdf-icon">📕</div>
                <p id="pdfName" style="margin-top: 10px; color: #555; font-weight: bold;"></p>
                <p style="font-size: 0.85rem; color: #888;">Documento PDF Listo para Analizar</p>
            </div>
        </div>

        <button class="btn" id="processBtn" disabled>Analizar Documento con IA</button>

        <div class="status" id="status"></div>

        <div class="history-container">
            <div class="history-title">
                <span>Últimas Facturas (Google Sheets)</span>
                <button onclick="loadHistory()" style="background:none; border:none; color:#667eea; cursor:pointer; font-size:1.2rem;" title="Actualizar historial">🔄</button>
            </div>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Empresa</th>
                        <th>Total</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr><td colspan="4" style="text-align:center;">Cargando historial...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        let selectedFile = null;

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const isImage = file.type.startsWith('image/');
            const isPdf = file.type === 'application/pdf';

            if (!isImage && !isPdf) {
                showStatus('Por favor, selecciona una imagen o un archivo PDF', 'error');
                return;
            }

            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewContainer.classList.add('active');
                if (isImage) {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'inline-block';
                    document.getElementById('pdfPreview').style.display = 'none';
                } else {
                    previewImage.style.display = 'none';
                    document.getElementById('pdfPreview').style.display = 'block';
                    document.getElementById('pdfName').innerText = file.name;
                }
                processBtn.disabled = false;
                status.classList.remove('active');
            };
            reader.readAsDataURL(file);
        }

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            showStatus('<span class="spinner"></span> Analizando documento con Gemini AI...', 'loading');

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const resultParts = e.target.result.split(',');
                    const base64 = resultParts[1];
                    const mimeMatch = resultParts[0].match(/:(.*?);/);
                    const mimeType = mimeMatch ? mimeMatch[1] : (selectedFile.type || 'application/octet-stream');

                    const response = await fetch('/api/process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file: base64, mimeType: mimeType, fileName: selectedFile.name })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        showStatus(
                            `✅ Factura procesada y guardada correctamente!<div class="result-details">
                                <p><strong>Empresa:</strong> ${data.empresa}</p>
                                <p><strong>Fecha:</strong> ${data.fecha}</p>
                                <p><strong>IVA:</strong> ${data.iva}€</p>
                                <p><strong>Total:</strong> ${data.total}€</p>
                                <p><strong>Categoría:</strong> <span style="background:#eef0ff; padding:2px 6px; border-radius:4px; font-weight:bold;">${data.categoria || 'N/A'}</span></p>
                                <p class="text-sm text-gray-500 mt-2" style="font-size:0.8rem; border-top:1px solid #ccc; padding-top:8px;"><em>* Marcada como "NO VERIFICADA" en Google Sheets para revisión humana.</em></p>
                            </div>`,
                            'success'
                        );
                        previewContainer.classList.remove('active');
                        selectedFile = null;
                        fileInput.value = '';
                        loadHistory(); // Recargar la tabla
                    } else {
                        showStatus(`Error: ${data.error || 'Problema al procesar'}`, 'error');
                    }
                    processBtn.disabled = false;
                };
                reader.readAsDataURL(selectedFile);
            } catch (err) {
                showStatus(`Error de conexión: ${err.message}`, 'error');
                processBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            status.innerHTML = message;
            status.className = `status active ${type}`;
        }

        async function loadHistory() {
            const tbody = document.getElementById('historyBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Cargando historial... <span class="spinner" style="width:12px; height:12px; border-width:2px; margin-left:5px;"></span></td></tr>';
            try {
                const res = await fetch('/api/process');
                if (res.ok) {
                    const data = await res.json();
                    if (data.history && data.history.length > 0) {
                        tbody.innerHTML = data.history.map(row => {
                            const verifClass = row.verificada === 'SI' ? 'si' : 'no';
                            const valor = row.total && !isNaN(row.total.replace(',', '.')) ? row.total + '€' : (row.total || '-');
                            return `<tr>
                                <td>${row.fecha || '-'}</td>
                                <td><strong>${row.empresa || 'Desconocida'}</strong></td>
                                <td>${valor}</td>
                                <td><span class="status-badge ${verifClass}">${row.verificada || 'NO'}</span></td>
                            </tr>`;
                        }).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No hay facturas registradas aún.</td></tr>';
                    }
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#e53e3e;">Error cargando registros del Sheet</td></tr>';
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#e53e3e;">Error de conexión con la API</td></tr>';
            }
        }

        // Cargar últimos registros al arrancar
        loadHistory();
    </script>
</body>
</html>
